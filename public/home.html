<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SelfAI Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            font-family: Poppins;
            margin: 0;
        }

        body {

            min-height: 100vh;

            background: linear-gradient(-45deg, #4f46e5, #2563eb, #7c3aed, #9333ea);

            background-size: 400% 400%;

            animation: bg 12s infinite;

            color: white;

            padding: 10px;

        }

        @keyframes bg {

            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }

        }

        header {

            padding: 20px;

            text-align: center;

            position: relative;

        }

        header h1 {

            font-size: 26px;

        }

        .logout {

            position: absolute;

            right: 20px;

            top: 20px;

            background: #ef4444;

            border: none;

            padding: 10px 15px;

            border-radius: 10px;

            color: white;

            cursor: pointer;

            transition: .3s;

        }

        .logout:hover {

            transform: scale(1.05);

            background: #dc2626;

        }

        main {

            max-width: 900px;

            margin: auto;

            padding: 20px;

        }

        .searchBox {

            display: flex;

            margin-top: 20px;

            background: rgba(255, 255, 255, .15);

            padding: 10px;

            border-radius: 15px;

            backdrop-filter: blur(20px);

            box-shadow: 0 10px 30px rgba(0, 0, 0, .2);

            gap: 10px;

        }

        .searchBox input {

            flex: 1;

            border: none;

            background: none;

            padding: 12px;

            color: white;

            font-size: 16px;

            outline: none;

        }

        .searchBox input::placeholder {

            color: #eee;

        }

        .searchBox button {

            border: none;

            background: white;

            color: #4f46e5;

            padding: 12px 20px;

            border-radius: 10px;

            cursor: pointer;

            font-weight: 600;

        }

        .results {

            margin-top: 30px;

        }

        .card {

            background: rgba(255, 255, 255, .15);

            padding: 20px;

            border-radius: 15px;

            margin-bottom: 15px;

            backdrop-filter: blur(20px);

            box-shadow: 0 10px 30px rgba(0, 0, 0, .2);

            opacity: 0;

            transform: translateY(20px);

            transition: .5s;

            word-break: break-word;

            white-space: pre-wrap;

        }

        .card.show {

            opacity: 1;

            transform: translateY(0);

        }

        .title {

            font-weight: 600;

            margin-top: 15px;

            opacity: .9;

            font-size: 14px;

        }

        .badge {

            display: inline-block;

            background: white;

            color: #4f46e5;

            font-size: 12px;

            padding: 4px 10px;

            border-radius: 20px;

            margin-bottom: 10px;

        }

        .loader {

            margin: auto;

            margin-top: 30px;

            width: 40px;

            height: 40px;

            border-radius: 50%;

            border: 5px solid rgba(255, 255, 255, .3);

            border-top: 5px solid white;

            animation: spin 1s linear infinite;

            display: none;

        }

        @keyframes spin {

            100% {
                transform: rotate(360deg);
            }

        }

        .empty {

            text-align: center;

            opacity: .8;

            margin-top: 30px;

        }

        @media(max-width:768px) {

            .logout {

                position: static;

                margin-top: 15px;

            }

            .searchBox {

                flex-direction: column;

            }

            .searchBox button {

                width: 100%;

            }

            main {

                padding: 10px;

            }

        }
    </style>

</head>

<body>

    <header>

        <h1>

            Welcome
            <span id="username"></span>

        </h1>

        <button class="logout" onclick="logout()">

            Logout

        </button>

    </header>

    <main>

        <div class="searchBox">

            <input id="query" placeholder="Ask SelfAI anything...">

            <button onclick="searchData()">

                Search

            </button>

        </div>

        <div class="loader" id="loader"></div>

        <div class="results" id="results"></div>

    </main>

    <script>

        let user = null;

        try {
            user = JSON.parse(localStorage.getItem('user'));
        } catch {
            user = null;
        }

        const token = localStorage.getItem('token');

        if (!token) {
            location.replace('login.html');
        }

        history.pushState(null, null, location.href);

        window.onpopstate = function () {

            history.go(1);

        };

        document.getElementById('username').innerText = user.name;

        document.getElementById("query")
            .addEventListener("keypress", function (e) {

                if (e.key === "Enter")
                    searchData();

            });

        function showToast(message, type = "error") {

            const toast = document.createElement("div");

            toast.innerText = message;

            toast.style.position = "fixed";

            toast.style.top = "20px";

            toast.style.right = "20px";

            toast.style.padding = "15px 20px";

            toast.style.borderRadius = "10px";

            toast.style.color = "white";

            toast.style.fontWeight = "500";

            toast.style.zIndex = "999";

            toast.style.background =
                type === "success"
                    ? "#16a34a"
                    : "#dc2626";

            document.body.appendChild(toast);

            setTimeout(() => {

                toast.remove();

            }, 3000);

        }

        function detectTool(query) {

            query = query.toLowerCase();

            if (query.includes("weather"))
                return "Weather 🌤️";

            if (query.includes("news"))
                return "News 📰";

            if (
                query.includes("calculate") ||
                query.includes("+") ||
                query.includes("-") ||
                query.includes("*") ||
                query.includes("/")
            )
                return "Calculator 🧮";

            if (query.includes("users"))
                return "Database 🗄️";

            if (query.includes("file"))
                return "File 📄";

            if (query.includes("email"))
                return "Email 📧";

            return "Web Search 🌐";

        }

        async function searchData() {

            const query = document.getElementById('query').value.trim();

            if (!query) return;

            const loader = document.getElementById('loader');

            loader.style.display = "block";

            const resultsDiv = document.getElementById('results');

            resultsDiv.innerHTML = "";

            try {

                const res = await fetch('/api/users/home', {

                    method: 'POST',

                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },

                    body: JSON.stringify({ query })

                });

                if (res.status === 401) {
                    localStorage.clear();
                    location.replace("login.html");
                    return;
                }


                const data = await res.json();

                loader.style.display = "none";

                if (!data.status) {

                    showToast(

                        data.errors?.join(", ") ||

                        data.message ||

                        "Error"

                    );

                    return;

                }

                const tool = detectTool(query);

                const card = document.createElement('div');

                card.className = "card";

                let html =
                    `<div class="badge">${tool}</div>`;


                if (data.data.city) {

                    html += `<div><b>City :</b> ${data.data.city}</div><div><b>Temperature :</b> ${data.data.temperature}</div><div><b>Condition :</b> ${data.data.description}</div><div><b>Humidity :</b> ${data.data.humidity}%</div>
                              <div><b>Wind :</b> ${data.data.windSpeed}</div>`;

                }


                else if (data.data.news) {

                    html += `<div class="title">Top Headlines</div>`;

                    data.data.news.forEach(n => {

                        html += `<div style="margin-top:8px;">• ${n}</div>`;

                    });

                }


                else if (data.data.expression) {

                    html += `<div><b>Expression :</b> ${data.data.expression}</div><div style="margin-top:10px; font-size:20px;"><b>Result :</b> ${data.data.result}</div>`;

                }


                else if (Array.isArray(data.data)) {

                    data.data.forEach(u => {

                        html += `<div style="margin-top:8px; padding:10px;background:rgba(255,255,255,.1);border-radius:10px;"><b>${u.name}</b><div style="font-size:13px; opacity:.8;">${u.email}
                            </div></div>`;

                    });

                }


                else if (data.data.file) {

                    html += `<div><b>File :</b> ${data.data.file}</div><pre style="margin-top:10px;background:black;padding:15px;border-radius:10px;overflow:auto;font-size:12px;">
                            ${data.data.content}</pre>`;

                }


                else if (data.data.error) {

                    html += `<div>Email Status :<b>${data.data.error}</b></div>`;

                }

                else if (data.data.results) {

                    data.data.results.forEach(r => {

                        html += `<div style="margin-top:10px;">${r}</div>`;

                    });

                }

                else {

                    html += `<pre>${JSON.stringify(data.data, null, 2)}</pre>`;

                }

                html += `<div class="title">Query : ${query}</div>`;

                card.innerHTML = html;

                resultsDiv.appendChild(card);

                setTimeout(() => {

                    card.classList.add("show");

                }, 100);

            }

            catch {

                loader.style.display = "none";

                showToast("Server error");

            }

        }

        async function logout() {

            try {

                await fetch('/api/users/logout', {

                    method: 'POST',

                    headers: {
                        'Authorization': 'Bearer ' + token
                    }

                });

                showToast("Logout successful", "success");

            }
            catch {

                showToast("Logout failed");

            }

            localStorage.clear();

            localStorage.clear();
            location.replace("login.html");
        }

    </script>

</body>

</html>
